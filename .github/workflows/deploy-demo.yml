name: Deploy Demo Snapshot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'pages-preview/**'
      - '.github/workflows/deploy-demo.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-demo
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate snapshot folder
        run: |
          test -d pages-preview || (echo "pages-preview folder is missing" && exit 1)
          test -f pages-preview/index.html || (echo "pages-preview/index.html is missing" && exit 1)

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
