name: Deploy Chat Plus

on:
  workflow_dispatch:
  repository_dispatch:
    types: [strapi-content-update]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: portal/package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        working-directory: portal
        run: npm ci

      - name: Validate build secrets
        run: |
          test -n "${{ secrets.STRAPI_URL }}" || (echo "STRAPI_URL secret is missing" && exit 1)
          test -n "${{ secrets.STRAPI_TOKEN }}" || (echo "STRAPI_TOKEN secret is missing" && exit 1)

      - name: Build Astro
        working-directory: portal
        env:
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: portal/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
