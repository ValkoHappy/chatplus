name: Code Pipeline

on:
  workflow_dispatch:
    inputs:
      with_seed:
        description: 'Run importer as part of the production update'
        required: false
        default: false
        type: boolean
  push:
    branches: [main]
    paths:
      - 'cms/**'
      - 'deploy/**'
      - 'portal/**'
      - 'scripts/**'
      - 'tests/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/code-pipeline.yml'

permissions:
  contents: read

concurrency:
  group: production-vps
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production-vps

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            portal/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install portal dependencies
        working-directory: portal
        run: npm ci

      - name: Validate build and deploy secrets
        env:
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
        run: |
          test -n "${STRAPI_URL}" || (echo "STRAPI_URL secret is missing" && exit 1)
          test -n "${STRAPI_TOKEN}" || (echo "STRAPI_TOKEN secret is missing" && exit 1)
          test -n "${VPS_HOST}" || (echo "VPS_HOST secret is missing" && exit 1)
          test -n "${VPS_USER}" || (echo "VPS_USER secret is missing" && exit 1)
          test -n "${VPS_SSH_KEY}" || (echo "VPS_SSH_KEY secret is missing" && exit 1)
          test -n "${VPS_APP_DIR}" || (echo "VPS_APP_DIR secret is missing" && exit 1)

      - name: Run contract tests
        run: npm run test:contracts

      - name: Run docs/code consistency check
        run: npm run check:docs-consistency

      - name: Build Astro and validate content contracts
        env:
          STRAPI_URL: ${{ secrets.STRAPI_URL }}
          STRAPI_TOKEN: ${{ secrets.STRAPI_TOKEN }}
        run: npm --prefix portal run build

      - name: Detect importer-relevant changes
        id: importer
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_WITH_SEED: ${{ inputs.with_seed }}
          BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          WITH_SEED="false"

          if [[ "${EVENT_NAME}" == "workflow_dispatch" && "${INPUT_WITH_SEED}" == "true" ]]; then
            WITH_SEED="true"
          elif [[ "${EVENT_NAME}" == "push" && -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            git diff --name-only "${BEFORE_SHA}" "${CURRENT_SHA}" > changed-files.txt
            if grep -Eq '^(cms/seed/|scripts/seed-runtime-content/)' changed-files.txt; then
              WITH_SEED="true"
            fi
          fi

          echo "with_seed=${WITH_SEED}" >> "${GITHUB_OUTPUT}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${VPS_SSH_PORT:-22}" -H "${VPS_HOST}" >> ~/.ssh/known_hosts

      - name: Deploy code on VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_PORT: ${{ secrets.VPS_SSH_PORT }}
          VPS_APP_DIR: ${{ secrets.VPS_APP_DIR }}
          WITH_SEED: ${{ steps.importer.outputs.with_seed }}
        run: |
          REMOTE_BRANCH="${GITHUB_REF_NAME:-main}"
          REMOTE_CMD="cd '${VPS_APP_DIR}' && git checkout '${REMOTE_BRANCH}' && git pull --ff-only origin '${REMOTE_BRANCH}' && ./deploy/scripts/update.sh --skip-pull"

          if [[ "${WITH_SEED}" == "true" ]]; then
            REMOTE_CMD="${REMOTE_CMD} --with-seed"
          fi

          ssh -p "${VPS_SSH_PORT:-22}" "${VPS_USER}@${VPS_HOST}" "${REMOTE_CMD}"
