<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1080" cy="80" r="220" fill="white" fill-opacity="0.04"/>
  <circle cx="120" cy="560" r="170" fill="white" fill-opacity="0.04"/>
  <circle cx="600" cy="600" r="300" fill="white" fill-opacity="0.03"/>
  <!-- Chat bubble decoration -->
  <rect x="80" y="200" width="180" height="110" rx="20" fill="white" fill-opacity="0.08"/>
  <rect x="80" y="200" width="180" height="110" rx="20" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <rect x="940" y="320" width="180" height="110" rx="20" fill="white" fill-opacity="0.08"/>
  <rect x="940" y="320" width="180" height="110" rx="20" fill="none" stroke="white" stroke-opacity="0.15" stroke-width="1"/>
  <!-- Brand name -->
  <text x="600" y="250" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="800" font-size="88" fill="white" text-anchor="middle" letter-spacing="-2">Chat Plus</text>
  <!-- Tagline -->
  <text x="600" y="330" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="400" font-size="30" fill="white" fill-opacity="0.88" text-anchor="middle">Омниканальная платформа для бизнеса</text>
  <!-- Divider -->
  <line x1="480" y1="365" x2="720" y2="365" stroke="white" stroke-opacity="0.25" stroke-width="1"/>
  <!-- Channels -->
  <text x="600" y="405" font-family="Inter, -apple-system, system-ui, sans-serif" font-size="22" fill="white" fill-opacity="0.65" text-anchor="middle" letter-spacing="1">WhatsApp · Telegram · Instagram · Viber · SMS · Email</text>
  <!-- Domain pill -->
  <rect x="488" y="440" width="224" height="52" rx="26" fill="white" fill-opacity="0.12"/>
  <text x="600" y="472" font-family="Inter, -apple-system, system-ui, sans-serif" font-weight="600" font-size="22" fill="white" text-anchor="middle">chatplus.ru</text>
</svg>
